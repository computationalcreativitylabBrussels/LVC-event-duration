name: LVC-event-duration
dependencies:
  - python
  - scipy=1.11.4
  - pyspark
  - py4j=0.10.9.7
  - jupyter
  - docopt
  - pip
  - conda-forge::stanza
  - spacy
  - scikit-learn
  - seaborn
  - conda-forge::pypalettes
  - arviz

variables:
  PYSPARK_DRIVER_PYTHON: YOUR-PATH-TO-PYSPARK-DRIVER # e.g., /Applications/anaconda3/bin/python.app
  PYSPARK_PYTHON: python
prefix: YOUR-PATH-TO-ENV # e.g., /Applications/anaconda3/envs/LVC-event-duration